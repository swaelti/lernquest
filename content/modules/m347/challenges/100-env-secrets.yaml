id: m347-env-secrets
module: m347
track: m347-compose
title: "Secrets richtig handhaben"
difficulty: 3
estimated_minutes: 10
type: multiple-choice
competencies:
  - HZ-C3
tags: [environment, secrets, security, env-file, best-practices]
prerequisites: [m347-compose-the-stack]
author: Simon
version: "1.0"

description: |
  Dein Team diskutiert, wie Datenbank-Passwörter und API-Keys
  im Docker-Setup konfiguriert werden sollen.

  Vier Vorschläge stehen im Raum. Welche sind **sicher genug
  für ein Produktiv-Setup**?

hints:
  - "Alles was im Image oder im docker-compose.yml steht, kann von jedem gelesen werden, der Zugriff auf das Repo hat."
  - "Environment Variables sind besser als Hardcoding, aber auch nicht perfekt."

config:
  mode: multi
  shuffle: true

  question: "Welche Methoden sind für Produktions-Umgebungen akzeptabel? (Mehrere Antworten möglich)"

  options:
    - id: a
      text: |
        Passwörter direkt in docker-compose.yml hartcodieren:
        `POSTGRES_PASSWORD: SuperSecret123`
      correct: false
      feedback: |
        Nie! Das docker-compose.yml wird oft ins Git-Repo eingecheckt.
        Passwörter im Klartext im Repo sind ein Sicherheitsrisiko.

    - id: b
      text: |
        Eine `.env`-Datei verwenden (in .gitignore) und im Compose
        referenzieren: `POSTGRES_PASSWORD: ${DB_PASS}`
      correct: true
      feedback: |
        Akzeptabel! Die `.env`-Datei liegt nur auf dem Server, nicht im
        Repo. Wichtig: `.env` muss in `.gitignore` stehen!

    - id: c
      text: |
        Docker Secrets verwenden:
        `docker secret create db_pass ./password.txt`
      correct: true
      feedback: |
        Die beste Option! Docker Secrets werden verschlüsselt gespeichert
        und nur im Container unter `/run/secrets/` als Datei bereitgestellt.
        Nicht als Environment Variable sichtbar.

    - id: d
      text: |
        Passwörter im Dockerfile mit ENV setzen:
        `ENV POSTGRES_PASSWORD=SuperSecret123`
      correct: false
      feedback: |
        Sehr schlecht! ENV-Werte im Dockerfile werden ins Image eingebettet.
        Jeder mit Zugriff auf das Image kann sie mit `docker inspect` lesen.
