id: m347-fix-my-dockerfile
module: m347
track: m347-grundlagen
title: "Fix my Dockerfile"
difficulty: 2
estimated_minutes: 10
type: fix-the-code
competencies:
  - HZ-B1
tags: [dockerfile, debugging, node, best-practice]
prerequisites: [m347-dockerfile-anatomie]
author: Simon
version: "1.0"

description: |
  Das folgende Dockerfile soll eine Node.js-Applikation bauen.
  Leider hat sich der Entwickler **3 Fehler** eingeschlichen.

  **Finde und korrigiere alle Fehler.**

  Tipps:
  - Achte auf Best Practices für Base Images
  - Prüfe die Pfadangaben
  - Überlege, welche CMD-Form empfohlen ist

hints:
  - "Das Base Image sollte eine gepinnte Version haben – 'node' allein zieht immer 'latest'."
  - "WORKDIR braucht einen absoluten Pfad (mit / am Anfang)."
  - "Die Exec-Form von CMD ist Best Practice: CMD [\"node\", \"server.js\"]"

config:
  language: dockerfile

  initial_code: |
    FROM node
    WORKDIR app
    COPY package.json .
    RUN npm install
    COPY . .
    EXPOSE 3000
    CMD npm start

  checks:
    - id: pinned-version
      type: regex
      pattern: 'FROM\s+node:\d+'
      hint: "Pinne die Node-Version im Base Image (z.B. node:20-alpine)"
      points: 30

    - id: absolute-workdir
      type: regex
      pattern: 'WORKDIR\s+/\w+'
      hint: "WORKDIR braucht einen absoluten Pfad (z.B. /app)"
      points: 35

    - id: exec-form-cmd
      type: regex
      pattern: 'CMD\s+\[.*\]'
      hint: "Verwende die Exec-Form: CMD [\"node\", \"server.js\"] oder CMD [\"npm\", \"start\"]"
      points: 35

  solution: |
    FROM node:20-alpine
    WORKDIR /app
    COPY package.json .
    RUN npm install --production
    COPY . .
    EXPOSE 3000
    CMD ["node", "server.js"]
